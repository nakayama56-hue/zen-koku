<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登記完了予定日一覧</title>
<style>
:root {
  --f: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
  --bg:        #e8e8ed;
  --surface:   rgba(255,255,255,0.75);
  --surface-2: rgba(255,255,255,0.96);
  --border:    rgba(0,0,0,0.1);
  --border-2:  rgba(0,0,0,0.06);
  --text:      #1d1d1f;
  --text-2:    #6e6e73;
  --text-3:    #aeaeb2;
  --accent:    #0071e3;
  --accent-lt: #e8f1fb;
  --red:       #ff3b30;
  --yellow:    #ffcc02;
  --green:     #28cd41;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.10), 0 0 1px rgba(0,0,0,0.06);
  --shadow-md: 0 6px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.16), 0 4px 12px rgba(0,0,0,0.08);
  --r:         12px;
  --r-sm:      8px;
  --r-pill:    999px;
  --trans:     0.16s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--f);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 90% 50% at 15% 0%, rgba(100,160,255,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 85% 100%, rgba(160,120,255,0.08) 0%, transparent 55%);
}

/* ─── HEADER（macOS ウィンドウ） ─── */
.site-header {
  background: rgba(246,246,248,0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.titlebar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px 10px;
}

.tl { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.tl-r { background: var(--red);    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15); }
.tl-y { background: var(--yellow); box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15); }
.tl-g { background: var(--green);  box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15); }

.header-body {
  padding: 10px 6vw 28px;
  text-align: center;
}

.page-title {
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.01em;
  line-height: 1.2;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 10px;
  background: rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: var(--r-pill);
  padding: 4px 14px;
  text-decoration: none;
  transition: background var(--trans), box-shadow var(--trans);
  cursor: pointer;
}

.header-badge:hover {
  background: rgba(0,113,227,0.08);
  border-color: rgba(0,113,227,0.2);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
}

.badge-num   { font-size: 14px; font-weight: 700; color: var(--accent); }
.badge-label { font-size: 12px; color: var(--text-2); letter-spacing: 0.03em; }

/* ─── TOOLBAR ─── */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(235,235,240,0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 rgba(255,255,255,0.5);
}

.toolbar-inner {
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 6vw;
}


/* タブ */
.tabs-row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 5px;
  padding: 10px 0;
}

.tab-btn {
  font-family: var(--f);
  font-size: 13px;
  font-weight: 400;
  padding: 6px 16px;
  border: 1px solid rgba(0,0,0,0.12);
  background: rgba(255,255,255,0.7);
  color: var(--text-2);
  cursor: pointer;
  border-radius: var(--r-pill);
  transition: all var(--trans);
  white-space: nowrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.8);
}

.tab-btn:hover {
  background: rgba(255,255,255,0.95);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.tab-btn.active {
  background: var(--accent);
  border-color: rgba(0,90,180,0.8);
  color: #fff;
  font-weight: 500;
  box-shadow: 0 2px 8px rgba(0,113,227,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
}

/* ─── MAIN ─── */
.main {
  max-width: 1140px;
  margin: 0 auto;
  padding: 28px 6vw 80px;
}

/* ─── GRID ─── */
.regions-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ─── CARD ─── */
.region-card {
  background: var(--surface-2);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(255,255,255,0.9);
  outline: 1px solid rgba(0,0,0,0.07);
  transition: box-shadow var(--trans), transform var(--trans);
  animation: pop 0.35s cubic-bezier(.22,.68,0,1.1) both;
}

.region-card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px) scale(1.005);
}

@keyframes pop {
  from { opacity: 0; transform: translateY(14px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card-header {
  padding: 14px 16px 12px;
  background: rgba(248,248,250,0.95);
  border-bottom: 1px solid var(--border-2);
  display: flex;
  align-items: center;
  gap: 10px;
}

.region-icon {
  width: 56px; height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}

.card-title-wrap { flex: 1; min-width: 0; }

.region-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.01em;
  display: block;
}

.region-sub {
  display: block;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  margin-top: 1px;
}

.region-count {
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-lt);
  border: 1px solid rgba(0,113,227,0.18);
  padding: 3px 9px;
  border-radius: var(--r-pill);
  flex-shrink: 0;
}

.card-links {
  padding: 6px 8px 8px;
  display: flex;
  flex-direction: column;
}

.office-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  text-decoration: none;
  color: var(--text);
  transition: background var(--trans), color var(--trans);
  border: 1px solid transparent;
}

.office-link:hover {
  background: var(--accent-lt);
  border-color: rgba(0,113,227,0.12);
  color: var(--accent);
}

.office-name-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.office-name {
  font-size: 14px;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pdf-badge {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-2);
  background: rgba(0,0,0,0.05);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}

.link-arrow {
  font-size: 14px;
  color: var(--text-3);
  transition: color var(--trans), transform var(--trans);
  flex-shrink: 0;
}

.office-link:hover .link-arrow { color: var(--accent); transform: translateX(2px); }

.card-divider { height: 1px; background: var(--border-2); margin: 1px 0; }

.sub-matches {
  display: block;
  font-size: 11px;
  color: var(--text-2);
  margin-top: 3px;
  line-height: 1.7;
  word-break: break-all;
}

mark {
  background: rgba(0,113,227,0.15);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 1px;
  font-weight: 600;
}

.empty-state {
  display: none;
  text-align: center;
  padding: 100px 20px;
  color: var(--text-3);
  font-size: 14px;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 1024px) {
  .regions-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
}

@media (max-width: 768px) {
  .toolbar-inner { padding: 0 16px; }
  .main { padding: 20px 16px 60px; }
  .regions-grid { grid-template-columns: 1fr; gap: 12px; }
  .tab-btn { font-size: 12px; padding: 6px 13px; }
}

@media (max-width: 480px) {
  .titlebar { padding: 12px 14px 8px; }
  .header-body { padding: 8px 16px 20px; }
  .region-name { font-size: 15px; }
  .office-name { font-size: 13px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-body">
    <h1 class="page-title">全国登記完了予定日一覧</h1>
    <a class="header-badge" href="https://houmukyoku.moj.go.jp/homu/static/kakukyoku_index.html#anchor2" target="_blank" rel="noopener">
      <span class="badge-num" id="totalCount">50</span>
      <span class="badge-label">全国法務局</span>
    </a>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="tabs-row" id="regionTabs">

      <button class="tab-btn" data-region="東北">東北</button>
      <button class="tab-btn" data-region="関東">関東</button>
      <button class="tab-btn" data-region="中部">中部</button>
      <button class="tab-btn" data-region="近畿">近畿</button>
      <button class="tab-btn" data-region="中国">中国</button>
      <button class="tab-btn" data-region="四国">四国</button>
      <button class="tab-btn" data-region="九州">九州</button>
    </div>
  </div>
</div>

<main class="main">
  <div class="regions-grid" id="regionsGrid"></div>
  <div class="empty-state" id="emptyState">該当する法務局が見つかりません</div>
</main>

let activeRegion = 'all';

function renderCards() {
  const grid    = document.getElementById('regionsGrid');
  const empty   = document.getElementById('emptyState');
  const totalEl = document.getElementById('totalCount');

  let filtered = data.filter(d => activeRegion==='all' || d.region===activeRegion);
  const total = filtered.reduce((s,d)=>s+d.offices.length,0);
  if (totalEl) totalEl.textContent = data.reduce((s,d)=>s+d.offices.length,0);

  if (filtered.length===0) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = filtered.map((d,i)=>`
    <div class="region-card" style="animation-delay:${i*0.05}s">
      <div class="card-header">
        <div class="region-icon">${ICONS[d.region]||'📍'}</div>
        <div class="card-title-wrap">
          <span class="region-name">${d.region}</span>
          <span class="region-sub">${REGION_EN[d.region]||''}</span>
        </div>
        <span class="region-count">${d.offices.length}局</span>
      </div>
      <div class="card-links">
        ${d.offices.map((o,j)=>{
          return `${j>0?'<div class="card-divider"></div>':''}
          <a class="office-link" href="${o.url}" target="_blank" rel="noopener">
            <span class="office-name-wrap">
              <span class="office-name">${o.name}</span>
              ${o.pdf?'<span class="pdf-badge">PDF</span>':''}
            </span>
            <span class="link-arrow">›</span>
          </a>`;
        }).join('')}
      </div>
    </div>`).join('');
}

document.getElementById('regionTabs').addEventListener('click', e=>{
  const btn=e.target.closest('.tab-btn'); if(!btn)return;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeRegion=btn.dataset.region;
  renderCards();
});

renderCards();
</script>
